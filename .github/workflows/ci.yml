name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests (SQLite)
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///:memory:
          OPENROUTER_API_KEY: test-key
        run: pytest -q

  backend-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: codoxis
          POSTGRES_PASSWORD: codoxis
          POSTGRES_DB: codoxis_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Alembic migrations
        env:
          DATABASE_URL: postgresql://codoxis:codoxis@localhost:5432/codoxis_test
        run: alembic upgrade head

      - name: Run golden graph tests
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: postgresql://codoxis:codoxis@localhost:5432/codoxis_test
          OPENROUTER_API_KEY: test-key
          PYTEST_USE_POSTGRES: "1"
        run: pytest tests/test_golden_graphs.py -q

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: npm run build

      - name: Lint
        run: npm run lint
